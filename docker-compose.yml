name: lostfound

# Shared backend environment (api + worker run the same image).
# Inline defaults make `docker compose up --build` work with zero setup;
# override any value via the host environment or a root .env file.
x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lf}:${POSTGRES_PASSWORD:-lf_pass}@postgres:5432/${POSTGRES_DB:-lostfound}
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-insecure-change-me}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
  MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
  APP_ENV: ${APP_ENV:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lf_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lostfound}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lf} -d ${POSTGRES_DB:-lostfound}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["arq", "app.workers.main.WorkerSettings"]
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media:/app/media

volumes:
  pgdata:
  redisdata:
  media:
